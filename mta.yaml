_schema-version: 3.3.0
ID: RiskManagement
description: A simple CAP project.
version: 1.0.1
modules:
- name: RiskManagement-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: RiskManagement-auth
  - name: RiskManagement-db
  - name: RiskManagement-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: RiskManagement-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: RiskManagement-db
  parameters:
    buildpack: nodejs_buildpack
- name: RiskManagement-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: RiskManagement-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - nsrisks.zip
      name: nsrisks
      target-path: resources/
- name: nsrisks
  type: html5
  path: app/risks
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: RiskManagement-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      role-collections:
      - description: generated
        name: RiskViewer (RiskManagement ${org}-${space})
        role-template-references:
        - $XSAPPNAME.RiskViewer
      - description: generated
        name: RiskManager (RiskManagement ${org}-${space})
        role-template-references:
        - $XSAPPNAME.RiskManager
      tenant-mode: dedicated
      xsappname: RiskManagement-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: RiskManagement-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: RiskManagement-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        subaccount:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          - Name: RiskManagement-repo-host
            ServiceInstanceName: RiskManagement-html5-service
            ServiceKeyName: RiskManagement-repo-host-key
            sap.cloud.service: RiskManagement
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  requires:
  - name: srv-api
  - name: RiskManagement-repo-host
    parameters:
      service-key:
        name: RiskManagement-repo-host-key
- name: RiskManagement-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: RiskManagement-html5-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production